<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Startpagina</title>

  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
    }

    h1 {
      text-align: center;
      padding: 25px 10px;
      margin: 0;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-title {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      background: rgb(46, 46, 46);
      color: white;
      padding: 10px;
      font-weight: bold;
      text-align: center;
    }

    /* Kaart = full width */
    .kaart {
      grid-column: 1 / 3;
      height: 350px;
    }

    .half {
      height: 250px;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }

      .kaart {
        grid-column: auto;
      }
    }
  </style>
</head>

<body>

  <h1>Welkom bij het samenwerkingsproject van de groepen van week 1</h1>

  <div class="container">

    <!-- KAART -->
    <a href="kaart.html" class="card kaart">
      <div class="card-title">Kaart</div>
      <img src="./fotos/preview_kaart.png" alt="Kaart preview">
    </a>

    <!-- GROEPEN -->
    <a href="groepen.html" class="card half">
      <div class="card-title">Groepen</div>
      <img src="./fotos/dag7_Nafplio.jpeg" alt="Groepen preview">
    </a>

    <!-- LOGBOEK -->
    <a href="logboek.html" class="card half">
      <div class="card-title">Logboek</div>
      <img src="./fotos/logboek.jpg" alt="Logboek preview">
    </a>

  </div>

</body>
</html>
